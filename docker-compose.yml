services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    volumes:
      - fraud-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - fraud-logs:/var/log/fraud:ro
      - logstash-data:/usr/share/logstash/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:9600/_node/pipelines/main >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  kibana-setup:
    image: curlimages/curl:8.10.1
    volumes:
      - ./scripts/setup-kibana.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "-c", "tr -d '\\r' < /setup.sh | /bin/sh"]
    environment:
      KIBANA_URL: http://kibana:5601
      DATA_VIEW_TITLE: fraud-detector-*
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    image: fraud-detector:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://fraud:fraud@db:5432/fraud
      LOG_FILE: /app/logs/fraud-detector.log
    volumes:
      - fraud-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  fraud-db-data:
  fraud-logs:
  es-data:
  logstash-data:
