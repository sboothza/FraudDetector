input {
  file {
    path => [
      "/var/log/fraud/fraud-detector.log",
      "/var/log/fraud/fraud-detector.log.*"
    ]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_fraud_detector"
    tags => ["fraud-detector"]
  }
}

filter {
  grok {
    match => {
      "message" => "%{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{HOUR}:%{MINUTE}:%{SECOND} %{LOGLEVEL:level} \[%{DATA:logger}\] %{GREEDYDATA:log_message}"
    }
    tag_on_failure => ["_grokparsefailure"]
  }

  mutate {
    add_field => {
      "log_timestamp" => "%{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{HOUR}:%{MINUTE}:%{SECOND}"
    }
    add_field => { "service" => "fraud-detector" }
  }

  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
    tag_on_failure => ["_dateparsefailure"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "fraud-detector-%{+YYYY.MM.dd}"
  }
}
